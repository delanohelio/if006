<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IF006 - Atividades</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/atom-one-dark.min.css">
</head>
<body>
  <main class="container">
    <h1>IF006 — Atividades</h1>
    <p class="subtitle">Selecione a atividade para responder.</p>

    <!-- Tela 1: seleção do formulário -->
    <section id="home-card" class="card">
      <h2>Escolha o formulário</h2>
      <div id="home-resume" class="hidden"></div>
      <div id="form-list">
        <p class="muted">Carregando formulários…</p>
      </div>
      <p id="home-error" class="error" aria-live="polite"></p>
    </section>

    <!-- Tela 2: identificação do aluno -->
    <section id="register-card" class="card hidden">
      <h2 id="register-title"></h2>
      <p id="register-desc" class="muted"></p>

      <label for="input-nome">Nome completo</label>
      <input id="input-nome" type="text" placeholder="Seu nome completo" autocomplete="name">

      <label for="input-email">E-mail</label>
      <input id="input-email" type="email" placeholder="seu@email.com" autocomplete="email">

      <div id="cpf-field" class="hidden">
        <label for="input-cpf">Último dígito do CPF (0 a 9)</label>
        <p class="muted cpf-hint">Usado apenas para determinar seu grupo no teste A/B.</p>
        <input id="input-cpf" type="number" min="0" max="9" placeholder="Ex.: 8">
        <p id="group-preview" class="muted">Grupo será definido automaticamente: par = A, ímpar = B.</p>
      </div>

      <div class="row gap" style="flex-wrap:wrap">
        <button id="register-btn" type="button">Iniciar atividade</button>
        <button id="register-back-btn" type="button" class="btn-secondary">Voltar</button>
      </div>
      <p id="register-error" class="error" aria-live="polite"></p>
    </section>

    <!-- Tela 3: questões -->
    <section id="quiz-card" class="card hidden">
      <p id="progress" class="muted"></p>
      <div class="row">
        <h2 id="question-title"></h2>
        <span id="group-badge" class="badge hidden"></span>
      </div>
      <p id="page-description" class="muted hidden"></p>

      <div id="code-panel" class="hidden">
        <pre><code id="code-block" class="language-java"></code></pre>
      </div>

      <div id="question-area"></div>

      <p id="quiz-error" class="error" aria-live="polite"></p>
    </section>

    <!-- Tela 4: resultado -->
    <section id="result-card" class="card hidden">
      <h2>Resumo final</h2>
      <p id="result-headline" class="muted"></p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Página</th>
              <th>Pergunta</th>
              <th>Resposta</th>
              <th>Tempo (s)</th>
              <th>Confiança</th>
            </tr>
          </thead>
          <tbody id="result-table-body"></tbody>
        </table>
      </div>

      <h3>Texto para guardar</h3>
      <textarea id="result-text" rows="12" readonly></textarea>
      <div class="row gap" style="flex-wrap:wrap;margin-top:10px">
        <button id="copy-result-btn" type="button">Copiar resumo</button>
        <button id="submit-sheets-btn" type="button" class="btn-accent2">Enviar para planilha</button>
        <button id="restart-btn" type="button" class="btn-secondary">Nova atividade</button>
      </div>
      <p id="copy-feedback"   class="muted" aria-live="polite"></p>
      <p id="submit-feedback" class="muted" aria-live="polite"></p>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/java.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
